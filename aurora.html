<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aurora">
<meta name="theme-color" content="#f0ede8">
<title>AURORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;
  --ink:#1a1814;
  --ink2:rgba(26,24,20,0.58);
  --ink3:rgba(26,24,20,0.32);
  --ink4:rgba(26,24,20,0.14);
  --glass:rgba(255,255,255,0.50);
  --glass2:rgba(255,255,255,0.72);
  --gb:rgba(255,255,255,0.78);
  --blur:blur(28px);
  --safe-t:env(safe-area-inset-top,44px);
  --safe-b:env(safe-area-inset-bottom,34px);
}
html,body{height:100%;width:100%;background:var(--bg);font-family:'Barlow',sans-serif;font-weight:300;color:var(--ink);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

/* BG */
#bgc{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.25;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px}

/* SHELL */
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;padding-top:var(--safe-t);padding-bottom:var(--safe-b)}

/* HEADER */
.hdr{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:30px;letter-spacing:-0.04em;color:var(--ink);line-height:1}
.hdr-r{display:flex;align-items:center;gap:10px}
.hdr-date{font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink3);font-weight:500}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);transition:all 0.2s;flex-shrink:0}
.icon-btn:active{transform:scale(0.88)}

/* NAV TABS */
.tabs{display:flex;gap:6px;padding:0 20px 14px;flex-shrink:0;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 20px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);color:var(--ink2);white-space:nowrap;flex-shrink:0;
  transition:all 0.25s cubic-bezier(0.34,1.2,0.64,1)}
.tab.active{background:var(--ink);color:white;border-color:var(--ink);box-shadow:0 4px 18px rgba(26,24,20,0.22)}
.tab:active{transform:scale(0.93)}

/* SCREENS */
.scr{flex:1;overflow:hidden;display:none;flex-direction:column}
.scr.on{display:flex}

/* ===== WALL SCREEN ===== */
#scr-wall{position:relative}
.wall-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 12px 20px;-webkit-overflow-scrolling:touch}
.wall-scroll::-webkit-scrollbar{display:none}

/* MASONRY */
.masonry{columns:2;column-gap:10px}
.m-card{
  break-inside:avoid;margin-bottom:10px;border-radius:18px;overflow:hidden;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);cursor:pointer;position:relative;
  transition:transform 0.2s cubic-bezier(0.34,1.2,0.64,1);
  animation:cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
.m-card:active{transform:scale(0.96)}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:none}}
.m-card img,.m-card video{width:100%;display:block;object-fit:cover;border-radius:0}
.m-card-body{padding:12px 14px}
.m-card-type{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:5px}
.m-card-text{font-size:13px;color:var(--ink2);line-height:1.5}
.m-card-date{font-size:10px;color:var(--ink4);margin-top:6px;letter-spacing:0.05em}
.m-card-mood{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15)}

/* tall/wide cards */
.m-card.tall img,.m-card.tall video{height:240px}
.m-card.short img,.m-card.short video{height:140px}
.m-card.med img,.m-card.med video{height:180px}
.m-card.text-only{background:var(--glass2)}
.m-card.text-only .m-card-body{padding:18px 16px}
.m-card.text-only .m-card-text{font-family:'Instrument Serif',serif;font-style:italic;font-size:16px;color:var(--ink);line-height:1.4}

/* FAB */
.fab{
  position:absolute;bottom:20px;right:20px;
  width:56px;height:56px;border-radius:50%;
  background:var(--ink);color:white;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 6px 24px rgba(26,24,20,0.28);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:5;
}
.fab:active{transform:scale(0.88) rotate(45deg)}
.fab svg{transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}

/* ===== HERO EXPAND ===== */
#hero-overlay{
  position:fixed;inset:0;z-index:100;display:none;
  align-items:flex-end;
}
#hero-overlay.open{display:flex}
#hero-blur-bg{
  position:absolute;inset:0;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:rgba(240,237,232,0.6);
  opacity:0;transition:opacity 0.4s ease;
}
#hero-overlay.open #hero-blur-bg{opacity:1}
#hero-sheet{
  position:relative;z-index:2;width:100%;
  background:var(--glass2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);border-bottom:none;
  border-radius:28px 28px 0 0;
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 -8px 40px rgba(26,24,20,0.12);
}
#hero-sheet::-webkit-scrollbar{display:none}
#hero-overlay.open #hero-sheet{transform:translateY(0)}
.hero-handle{width:36px;height:4px;background:var(--ink4);border-radius:2px;margin:12px auto 0}
.hero-img-wrap{margin:14px 16px;border-radius:20px;overflow:hidden}
.hero-img-wrap img,.hero-img-wrap video{width:100%;display:block;max-height:60vh;object-fit:cover;border-radius:20px}
.hero-body{padding:0 20px 32px}
.hero-type{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:8px}
.hero-text{font-size:17px;color:var(--ink);line-height:1.6;font-weight:300}
.hero-text.italic{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px}
.hero-meta{font-size:11px;color:var(--ink3);margin-top:12px;letter-spacing:0.05em}
.hero-actions{display:flex;gap:10px;margin-top:20px}
.hero-act-btn{
  flex:1;padding:13px;border-radius:16px;border:none;cursor:pointer;
  font-size:13px;font-weight:500;font-family:'Barlow',sans-serif;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);color:var(--ink2);
  transition:all 0.2s;
}
.hero-act-btn:active{transform:scale(0.96)}
.hero-act-btn.danger{background:rgba(220,50,50,0.08);color:rgba(200,40,40,0.8);border-color:rgba(220,50,50,0.15)}
.hero-close{position:absolute;top:14px;right:16px;width:30px;height:30px;border-radius:50%;background:var(--ink4);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);transition:all 0.2s}
.hero-close:active{transform:scale(0.88)}

/* ===== ADD MODAL ===== */
#add-modal{
  position:fixed;inset:0;z-index:90;display:none;align-items:flex-end;
}
#add-modal.open{display:flex}
#add-blur{position:absolute;inset:0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(240,237,232,0.5);opacity:0;transition:opacity 0.35s}
#add-modal.open #add-blur{opacity:1}
#add-sheet{
  position:relative;z-index:2;width:100%;
  background:var(--glass2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);border-bottom:none;
  border-radius:28px 28px 0 0;
  padding:12px 20px calc(var(--safe-b) + 20px);
  transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 -8px 40px rgba(26,24,20,0.12);
}
#add-modal.open #add-sheet{transform:translateY(0)}
.add-handle{width:36px;height:4px;background:var(--ink4);border-radius:2px;margin:0 auto 18px}
.add-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;color:var(--ink);margin-bottom:16px;letter-spacing:-0.02em}
.add-types{display:flex;gap:8px;margin-bottom:18px}
.add-type{flex:1;padding:10px 0;border-radius:14px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;
  background:rgba(255,255,255,0.4);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);color:var(--ink2);transition:all 0.2s}
.add-type.active{background:var(--ink);color:white;border-color:var(--ink)}
.add-type:active{transform:scale(0.94)}

/* add panels */
.add-panel{display:none;flex-direction:column;gap:12px}
.add-panel.on{display:flex}
.add-textarea{
  width:100%;min-height:100px;background:rgba(255,255,255,0.5);
  border:1px solid var(--gb);border-radius:16px;padding:14px 16px;
  font-size:15px;font-family:'Barlow',sans-serif;color:var(--ink);
  resize:none;outline:none;line-height:1.6;
  transition:border-color 0.2s;
}
.add-textarea::placeholder{color:var(--ink3)}
.add-textarea:focus{border-color:rgba(26,24,20,0.25)}
.add-img-zone{
  min-height:130px;border-radius:18px;border:1.5px dashed var(--ink4);
  background:rgba(255,255,255,0.35);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;cursor:pointer;
  transition:all 0.2s;
}
.add-img-zone:active{background:rgba(255,255,255,0.55)}
.add-img-zone-icon{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;color:var(--ink3)}
.add-img-zone-label{font-size:13px;color:var(--ink3);font-weight:500}
.add-img-preview{border-radius:16px;overflow:hidden;position:relative}
.add-img-preview img{width:100%;max-height:200px;object-fit:cover;display:block;border-radius:16px}
.add-img-actions{position:absolute;bottom:8px;right:8px;display:flex;gap:6px}
.add-img-act{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:'Barlow',sans-serif}
.img-change{background:rgba(255,255,255,0.85);color:var(--ink)}
.img-remove{background:rgba(220,60,60,0.8);color:white}
.add-save{
  width:100%;padding:15px;border-radius:18px;border:none;
  background:var(--ink);color:white;font-size:15px;font-weight:500;
  font-family:'Barlow',sans-serif;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.02em;
}
.add-save:active{transform:scale(0.97);opacity:0.88}
.char-count{font-size:10px;color:var(--ink3);text-align:right;letter-spacing:0.05em}
.char-count.warn{color:rgba(200,60,40,0.8)}

/* ===== TODO SCREEN ===== */
#scr-todo{padding:0 20px}
.todo-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.todo-scroll::-webkit-scrollbar{display:none}
.todo-section{margin-bottom:24px}
.todo-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.todo-section-title{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);font-weight:600}
.todo-add-btn{width:26px;height:26px;border-radius:50%;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);transition:all 0.2s}
.todo-add-btn:active{transform:scale(0.88)}
.todo-list{display:flex;flex-direction:column;gap:8px}
.todo-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:16px;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);cursor:pointer;
  transition:all 0.2s;
}
.todo-item:active{transform:scale(0.98)}
.todo-check{
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.todo-check.done{background:var(--ink);border-color:var(--ink)}
.todo-check svg{display:none}
.todo-check.done svg{display:block}
.todo-label{font-size:14px;color:var(--ink2);flex:1;transition:all 0.2s;font-weight:400}
.todo-label.done{color:var(--ink4);text-decoration:line-through}
.todo-del{width:20px;height:20px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink4);transition:all 0.2s;flex-shrink:0}
.todo-del:active{background:rgba(220,50,50,0.1);color:rgba(200,40,40,0.7);transform:scale(0.88)}
.todo-input-row{display:flex;gap:8px;align-items:center}
.todo-input{
  flex:1;background:rgba(255,255,255,0.5);border:1px solid var(--gb);
  border-radius:14px;padding:11px 14px;font-size:14px;
  font-family:'Barlow',sans-serif;color:var(--ink);outline:none;
  transition:border-color 0.2s;
}
.todo-input::placeholder{color:var(--ink3)}
.todo-input:focus{border-color:rgba(26,24,20,0.25)}
.todo-confirm{
  width:38px;height:38px;border-radius:12px;background:var(--ink);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;
  flex-shrink:0;transition:all 0.2s;
}
.todo-confirm:active{transform:scale(0.88)}

/* ===== MOOD SCREEN ===== */
#scr-mood{padding:0 20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scr-mood::-webkit-scrollbar{display:none}
.mood-section{margin-bottom:24px}
.mood-section-title{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:12px}
.mood-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0}
.mood-pill{
  display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:999px;cursor:pointer;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);font-size:13px;color:var(--ink2);font-weight:500;
  transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.mood-pill:active{transform:scale(0.93)}
.mood-pill.active{background:var(--ink);color:white;border-color:var(--ink)}
.mood-pill .mp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all 0.2s}
.mood-pill.active .mp-dot{background:rgba(255,255,255,0.6)!important}
.mood-cur-card{
  padding:16px 18px;border-radius:18px;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gb);margin-bottom:0;
}
.mood-cur-label{font-size:9.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:6px}
.mood-cur-val{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--ink)}
/* calendar */
.cal-wrap{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--gb);border-radius:22px;padding:16px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-0.01em}
.cal-nav{display:flex;gap:6px}
.cal-arr{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.5);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);transition:all 0.18s}
.cal-arr:active{transform:scale(0.88)}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-days-hdr span{text-align:center;font-size:10px;letter-spacing:0.08em;color:var(--ink3);font-weight:600;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:500;color:var(--ink2);cursor:pointer;position:relative;transition:all 0.15s}
.cal-day:active{transform:scale(0.85)}
.cal-day.empty{cursor:default}
.cal-day.today{color:var(--ink);font-weight:700}
.cal-day.today::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--ink)}
.cal-day .day-dot{position:absolute;inset:1px;border-radius:50%;opacity:0.3}
.cal-day.has-mood .day-dot{opacity:0.45}
.cal-day-num{position:relative;z-index:1;font-size:11px}

/* ANIMATIONS */
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.ripple-wrap{position:relative;overflow:hidden}
.ripple-dot{position:absolute;border-radius:50%;background:rgba(26,24,20,0.08);transform:scale(0);animation:ripple 0.5s ease-out forwards;pointer-events:none}

/* TOAST */
#toast{
  position:fixed;bottom:calc(var(--safe-b) + 90px);left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(26,24,20,0.82);backdrop-filter:var(--blur);color:white;
  padding:10px 22px;border-radius:999px;font-size:12px;font-weight:500;
  z-index:200;white-space:nowrap;pointer-events:none;opacity:0;
  transition:opacity 0.3s,transform 0.3s cubic-bezier(0.22,1,0.36,1);
  letter-spacing:0.03em;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bnav{
  flex-shrink:0;padding:8px 20px 4px;
  display:flex;justify-content:space-around;align-items:center;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-top:1px solid var(--gb);
}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 16px;border-radius:999px;cursor:pointer;transition:all 0.22s cubic-bezier(0.34,1.2,0.64,1);position:relative}
.bn-item:active{transform:scale(0.88)}
.bn-item.active{background:rgba(26,24,20,0.08)}
.bn-icon{color:var(--ink3);transition:color 0.2s}
.bn-item.active .bn-icon{color:var(--ink)}
.bn-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background 0.2s}
.bn-item.active .bn-dot{background:var(--ink)}
</style>
</head>
<body>

<canvas id="bgc"></canvas>
<div class="grain"></div>

<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">Aurora</div>
    <div class="hdr-r">
      <span class="hdr-date" id="hdr-date">APR 2</span>
      <div class="icon-btn" onclick="openAdd()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('wall',this)">Wall</div>
    <div class="tab" onclick="switchTab('todo',this)">To do</div>
    <div class="tab" onclick="switchTab('mood',this)">Mood</div>
  </div>

  <!-- WALL -->
  <div class="scr on" id="scr-wall">
    <div class="wall-scroll">
      <div class="masonry" id="masonry"></div>
    </div>
    <div class="fab" onclick="openAdd()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
  </div>

  <!-- TODO -->
  <div class="scr" id="scr-todo">
    <div class="todo-scroll" id="todo-scroll"></div>
  </div>

  <!-- MOOD -->
  <div class="scr" id="scr-mood">
    <div class="mood-section">
      <div class="mood-section-title">How are you today?</div>
      <div class="mood-pills" id="mood-pills">
        <div class="mood-pill active" data-mood="calm" data-color="#6ab4d4" data-label="Calm · Grounded · Present" onclick="setMood(this)"><div class="mp-dot" style="background:#6ab4d4"></div>Calm</div>
        <div class="mood-pill" data-mood="focused" data-color="#a07ed4" data-label="Focused · Sharp · Intentional" onclick="setMood(this)"><div class="mp-dot" style="background:#a07ed4"></div>Focused</div>
        <div class="mood-pill" data-mood="creative" data-color="#d4a06a" data-label="Creative · Open · Inspired" onclick="setMood(this)"><div class="mp-dot" style="background:#d4a06a"></div>Creative</div>
        <div class="mood-pill" data-mood="restless" data-color="#d46a6a" data-label="Restless · Energized · Alive" onclick="setMood(this)"><div class="mp-dot" style="background:#d46a6a"></div>Restless</div>
        <div class="mood-pill" data-mood="tender" data-color="#d47aaa" data-label="Tender · Soft · Reflective" onclick="setMood(this)"><div class="mp-dot" style="background:#d47aaa"></div>Tender</div>
      </div>
    </div>
    <div class="mood-section">
      <div class="mood-cur-card">
        <div class="mood-cur-label">Current Aura</div>
        <div class="mood-cur-val" id="mood-cur-val">Calm · Grounded · Present</div>
      </div>
    </div>
    <div class="mood-section">
      <div class="mood-section-title" style="margin-bottom:12px" id="cal-month-title">April 2026</div>
      <div class="cal-wrap">
        <div class="cal-hdr">
          <div class="cal-title" id="cal-month">April 2026</div>
          <div class="cal-nav">
            <div class="cal-arr" onclick="calPrev()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></div>
            <div class="cal-arr" onclick="calNext()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9,18 15,12 9,6"/></svg></div>
          </div>
        </div>
        <div class="cal-days-hdr"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- HERO OVERLAY -->
<div id="hero-overlay" onclick="closeHero(event)">
  <div id="hero-blur-bg"></div>
  <div id="hero-sheet">
    <div class="hero-handle"></div>
    <div class="hero-close" onclick="closeHero()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <div class="hero-img-wrap" id="hero-img-wrap" style="display:none"></div>
    <div class="hero-body">
      <div class="hero-type" id="hero-type"></div>
      <div class="hero-text" id="hero-text"></div>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-actions">
        <button class="hero-act-btn" onclick="copyHeroText()">Copy</button>
        <button class="hero-act-btn danger" id="hero-del-btn">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div id="add-modal" onclick="closeAddModal(event)">
  <div id="add-blur"></div>
  <div id="add-sheet">
    <div class="add-handle"></div>
    <div class="add-title">Add to Aurora</div>
    <div class="add-types">
      <div class="add-type active" id="atype-note" onclick="setAddType('note',this)">Note</div>
      <div class="add-type" id="atype-image" onclick="setAddType('image',this)">Image</div>
      <div class="add-type" id="atype-quote" onclick="setAddType('quote',this)">Quote</div>
    </div>
    <!-- note panel -->
    <div class="add-panel on" id="apanel-note">
      <textarea class="add-textarea" id="note-ta" placeholder="What's on your mind..." maxlength="500" oninput="updateChar(this,'note-char')"></textarea>
      <div class="char-count" id="note-char">0 / 500</div>
    </div>
    <!-- image panel -->
    <div class="add-panel" id="apanel-image">
      <input type="file" id="img-input" accept="image/*,video/*" style="display:none" onchange="handleImg(this)">
      <div class="add-img-zone" id="img-zone" onclick="document.getElementById('img-input').click()">
        <div class="add-img-zone-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
        <div class="add-img-zone-label">Tap to choose photo or video</div>
      </div>
      <div class="add-img-preview" id="img-preview" style="display:none">
        <img id="img-prev-el" src="" style="display:block"/>
        <div class="add-img-actions">
          <button class="add-img-act img-change" onclick="document.getElementById('img-input').click()">Change</button>
          <button class="add-img-act img-remove" onclick="clearImg()">Remove</button>
        </div>
      </div>
      <textarea class="add-textarea" id="img-caption" placeholder="Caption..." maxlength="200" style="min-height:60px" oninput="updateChar(this,'img-char')"></textarea>
      <div class="char-count" id="img-char">0 / 200</div>
    </div>
    <!-- quote panel -->
    <div class="add-panel" id="apanel-quote">
      <textarea class="add-textarea" id="quote-ta" placeholder='"Enter a quote..."' maxlength="300" oninput="updateChar(this,'quote-char')"></textarea>
      <div class="char-count" id="quote-char">0 / 300</div>
    </div>
    <button class="add-save" onclick="saveEntry()">Save to Wall</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ============ BG CANVAS ============
const bgC=document.getElementById('bgc');
const bgX=bgC.getContext('2d');
const BG_ORBS=[
  {x:0.08,y:0.05,r:0.55,c:'#a8c4e8',a:0.55},
  {x:0.88,y:0.1,r:0.5,c:'#e8c4a8',a:0.45},
  {x:0.5,y:0.45,r:0.6,c:'#f0e8e0',a:0.3},
  {x:0.05,y:0.7,r:0.45,c:'#c4a8e8',a:0.4},
  {x:0.9,y:0.8,r:0.5,c:'#a8e8c4',a:0.35},
  {x:0.5,y:0.92,r:0.55,c:'#e8d4a8',a:0.4},
];

function drawBg(){
  const W=bgC.width=window.innerWidth;
  const H=bgC.height=window.innerHeight;
  bgX.fillStyle='#f0ede8';bgX.fillRect(0,0,W,H);
  for(const o of BG_ORBS){
    const x=o.x*W,y=o.y*H,r=o.r*Math.max(W,H);
    const g=bgX.createRadialGradient(x,y,0,x,y,r);
    const c=hexRgb(o.c);
    g.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${o.a})`);
    g.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);
    bgX.beginPath();bgX.arc(x,y,r,0,Math.PI*2);
    bgX.fillStyle=g;bgX.fill();
  }
}
function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
drawBg();window.addEventListener('resize',drawBg);

// ============ DATA ============
const STORE='aurora_v1';
let wallCards=[];
let todoLists=[
  {id:'today',title:'Today',items:[{id:1,text:'Morning routine',done:false},{id:2,text:'Journal entry',done:true}]},
  {id:'week',title:'This Week',items:[{id:3,text:'Call a friend',done:false}]},
];
let moodLog={};
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let currentMood={mood:'calm',color:'#6ab4d4',label:'Calm · Grounded · Present'};
let heroCardId=null;
let addImgData=null;
let addType='note';

function save(){
  try{localStorage.setItem(STORE,JSON.stringify({wallCards,todoLists,moodLog,currentMood}));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE)||'{}');
    if(d.wallCards)wallCards=d.wallCards;
    if(d.todoLists)todoLists=d.todoLists;
    if(d.moodLog)moodLog=d.moodLog;
    if(d.currentMood){currentMood=d.currentMood;applyMoodUI();}
  }catch(e){}
}

// ============ TIME ============
function tick(){
  const n=new Date();
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('hdr-date').textContent=M[n.getMonth()].toUpperCase()+' '+n.getDate();
}
tick();setInterval(tick,60000);

// ============ TABS ============
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById('scr-'+name).classList.add('on');
  if(name==='todo')renderTodo();
  if(name==='mood')renderCalendar();
}

// ============ WALL ============
const CARD_SIZES=['tall','med','short','med','tall','short'];
function renderWall(){
  const m=document.getElementById('masonry');
  m.innerHTML='';
  if(!wallCards.length){
    m.innerHTML='<div style="text-align:center;padding:60px 20px;color:rgba(26,24,20,0.28);font-size:14px;column-span:all">Your wall is empty.<br>Tap + to add your first moment.</div>';
    return;
  }
  wallCards.forEach((card,i)=>{
    const el=document.createElement('div');
    const sz=CARD_SIZES[i%CARD_SIZES.length];
    el.className='m-card '+(card.type==='quote'?'text-only':sz);
    el.style.animationDelay=(i*0.06)+'s';
    if(card.mood){
      const dot=document.createElement('div');
      dot.className='m-card-mood';
      dot.style.background=card.moodColor||'#ccc';
      el.appendChild(dot);
    }
    if(card.imgSrc&&card.type!=='quote'){
      const img=document.createElement('img');
      img.src=card.imgSrc;img.loading='lazy';
      el.appendChild(img);
    }
    const body=document.createElement('div');
    body.className='m-card-body';
    body.innerHTML=`<div class="m-card-type">${card.type}</div>
      <div class="m-card-text">${card.text||''}</div>
      <div class="m-card-date">${card.date||''}</div>`;
    el.appendChild(body);
    el.onclick=()=>openHero(card.id);
    m.appendChild(el);
  });
}

// ============ HERO ============
function openHero(id){
  const card=wallCards.find(c=>c.id===id);
  if(!card)return;
  heroCardId=id;
  const overlay=document.getElementById('hero-overlay');
  const imgWrap=document.getElementById('hero-img-wrap');
  document.getElementById('hero-type').textContent=card.type.toUpperCase();
  const textEl=document.getElementById('hero-text');
  textEl.textContent=card.text||'';
  textEl.className='hero-text'+(card.type==='quote'?' italic':'');
  document.getElementById('hero-meta').textContent=card.date||'';
  imgWrap.innerHTML='';
  if(card.imgSrc){
    const img=document.createElement('img');
    img.src=card.imgSrc;imgWrap.appendChild(img);
    imgWrap.style.display='block';
  } else imgWrap.style.display='none';
  document.getElementById('hero-del-btn').onclick=()=>deleteCard(id);
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeHero(e){
  if(e&&e.target!==document.getElementById('hero-overlay')&&e.target!==document.getElementById('hero-blur-bg'))return;
  document.getElementById('hero-overlay').classList.remove('open');
  document.body.style.overflow='';
  heroCardId=null;
}

function deleteCard(id){
  wallCards=wallCards.filter(c=>c.id!==id);
  save();renderWall();
  document.getElementById('hero-overlay').classList.remove('open');
  document.body.style.overflow='';
  showToast('Deleted');
}

function copyHeroText(){
  const t=document.getElementById('hero-text').textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>showToast('Copied!'));
  else showToast('Copy not supported');
}

// ============ ADD ============
function openAdd(){
  document.getElementById('add-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeAddModal(e){
  if(e&&e.target!==document.getElementById('add-modal')&&e.target!==document.getElementById('add-blur'))return;
  document.getElementById('add-modal').classList.remove('open');
  document.body.style.overflow='';
}
function setAddType(type,el){
  addType=type;
  document.querySelectorAll('.add-type').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.add-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('apanel-'+type).classList.add('on');
}
function updateChar(ta,countId){
  const el=document.getElementById(countId);
  el.textContent=ta.value.length+' / '+ta.maxLength;
  el.classList.toggle('warn',ta.value.length>ta.maxLength*0.85);
}
function handleImg(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    addImgData=e.target.result;
    document.getElementById('img-prev-el').src=addImgData;
    document.getElementById('img-preview').style.display='block';
    document.getElementById('img-zone').style.display='none';
  };
  reader.readAsDataURL(file);
}
function clearImg(){
  addImgData=null;
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-zone').style.display='flex';
  document.getElementById('img-input').value='';
}
function saveEntry(){
  const now=new Date();
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr=MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  let card={id:Date.now(),type:addType,date:dateStr,mood:currentMood.mood,moodColor:currentMood.color};

  if(addType==='image'){
    if(!addImgData){showToast('Add an image first');return;}
    const cap=document.getElementById('img-caption').value.trim();
    card.imgSrc=addImgData;card.text=cap||'';
    clearImg();document.getElementById('img-caption').value='';
  } else if(addType==='note'){
    const val=document.getElementById('note-ta').value.trim();
    if(!val){showToast('Write something first');return;}
    card.text=val;document.getElementById('note-ta').value='';
    document.getElementById('note-char').textContent='0 / 500';
  } else {
    const val=document.getElementById('quote-ta').value.trim();
    if(!val){showToast('Write a quote first');return;}
    card.text=val;document.getElementById('quote-ta').value='';
    document.getElementById('quote-char').textContent='0 / 300';
  }

  // also log to moodLog
  const todayKey=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')+'-'+now.getDate().toString().padStart(2,'0');
  if(!moodLog[todayKey])moodLog[todayKey]={mood:currentMood.mood,color:currentMood.color,label:currentMood.label,entries:[]};
  if(card.text)moodLog[todayKey].entries.push(card.text);

  wallCards.unshift(card);
  save();renderWall();
  document.getElementById('add-modal').classList.remove('open');
  document.body.style.overflow='';
  showToast('Added to wall ✦');
}

// ============ TODO ============
function renderTodo(){
  const scroll=document.getElementById('todo-scroll');
  scroll.innerHTML='';
  todoLists.forEach(list=>{
    const sec=document.createElement('div');
    sec.className='todo-section';
    sec.innerHTML=`<div class="todo-section-hdr">
      <div class="todo-section-title">${list.title}</div>
      <div class="todo-add-btn" onclick="showTodoInput('${list.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>
    <div class="todo-list" id="tl-${list.id}"></div>
    <div id="ti-${list.id}" style="display:none;margin-top:8px">
      <div class="todo-input-row">
        <input class="todo-input" id="tin-${list.id}" placeholder="New intention..." maxlength="80"
          onkeydown="if(event.key==='Enter')confirmTodo('${list.id}');if(event.key==='Escape')hideTodoInput('${list.id}')"/>
        <button class="todo-confirm" onclick="confirmTodo('${list.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
        </button>
      </div>
    </div>`;
    scroll.appendChild(sec);
    const listEl=document.getElementById('tl-'+list.id);
    list.items.forEach(item=>{
      const row=document.createElement('div');
      row.className='todo-item';
      row.innerHTML=`<div class="todo-check ${item.done?'done':''}" id="tc-${item.id}" onclick="toggleTodo('${list.id}',${item.id},this)">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="todo-label ${item.done?'done':''}" id="tl-i-${item.id}">${item.text}</span>
        <div class="todo-del" onclick="deleteTodo('${list.id}',${item.id})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>`;
      listEl.appendChild(row);
    });
  });
}
function toggleTodo(listId,itemId,checkEl){
  const list=todoLists.find(l=>l.id===listId);
  const item=list.items.find(i=>i.id===itemId);
  item.done=!item.done;
  checkEl.classList.toggle('done');
  document.getElementById('tl-i-'+itemId).classList.toggle('done');
  if(item.done){
    checkEl.style.transform='scale(1.4)';checkEl.style.transition='transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
    setTimeout(()=>{checkEl.style.transform='scale(1)';},10);
  }
  save();
}
function deleteTodo(listId,itemId){
  const list=todoLists.find(l=>l.id===listId);
  list.items=list.items.filter(i=>i.id!==itemId);
  save();renderTodo();
}
function showTodoInput(listId){
  document.getElementById('ti-'+listId).style.display='block';
  setTimeout(()=>document.getElementById('tin-'+listId).focus(),100);
}
function hideTodoInput(listId){
  document.getElementById('ti-'+listId).style.display='none';
  document.getElementById('tin-'+listId).value='';
}
function confirmTodo(listId){
  const input=document.getElementById('tin-'+listId);
  const val=input.value.trim();if(!val)return;
  const list=todoLists.find(l=>l.id===listId);
  list.items.push({id:Date.now(),text:val,done:false});
  hideTodoInput(listId);save();renderTodo();
}

// ============ MOOD ============
function setMood(el){
  document.querySelectorAll('.mood-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  currentMood={mood:el.dataset.mood,color:el.dataset.color,label:el.dataset.label};
  document.getElementById('mood-cur-val').textContent=currentMood.label;
  const todayKey=new Date().toISOString().slice(0,10);
  if(!moodLog[todayKey])moodLog[todayKey]={entries:[]};
  moodLog[todayKey].mood=currentMood.mood;
  moodLog[todayKey].color=currentMood.color;
  moodLog[todayKey].label=currentMood.label;
  renderCalendar();save();
}
function applyMoodUI(){
  document.querySelectorAll('.mood-pill').forEach(p=>{
    p.classList.toggle('active',p.dataset.mood===currentMood.mood);
  });
  document.getElementById('mood-cur-val').textContent=currentMood.label;
}

// ============ CALENDAR ============
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
function renderCalendar(){
  document.getElementById('cal-month').textContent=MONTH_NAMES[calM]+' '+calY;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const first=new Date(calY,calM,1).getDay();
  const offset=first===0?6:first-1;
  const days=new Date(calY,calM+1,0).getDate();
  const today=new Date();
  for(let i=0;i<offset;i++){const c=document.createElement('div');c.className='cal-day empty';grid.appendChild(c);}
  for(let d=1;d<=days;d++){
    const key=calY+'-'+(calM+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    const isToday=today.getDate()===d&&today.getMonth()===calM&&today.getFullYear()===calY;
    const data=moodLog[key];
    const c=document.createElement('div');
    c.className='cal-day'+(isToday?' today':'')+(data?' has-mood':'');
    if(data){const dot=document.createElement('div');dot.className='day-dot';dot.style.background=data.color||'#aaa';c.appendChild(dot);}
    const num=document.createElement('div');num.className='cal-day-num';num.textContent=d;c.appendChild(num);
    grid.appendChild(c);
  }
}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCalendar();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCalendar();}

// ============ TOAST ============
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ============ INIT ============
load();
renderWall();
renderCalendar();

// init mood today
const tk=new Date().toISOString().slice(0,10);
if(!moodLog[tk]){moodLog[tk]={mood:currentMood.mood,color:currentMood.color,label:currentMood.label,entries:[]};save();}
</script>
</body>
</html>
